{% extends "base.html" %}
{% block title %}Calendar — Pucon Kayak Retreat{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">
    <h1>Availability Calendar</h1>
    <div class="page-subtitle">Click any day to see reservations</div>
  </div>
  <a href="{{ url_for('new_reservation') }}" class="btn btn-primary">+ New Booking</a>
</div>

{% if sheets_error %}
  <div class="alert alert-error">{{ sheets_error }}</div>
{% endif %}

<!-- Legend -->
<div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center">
  <span style="font-size:.8rem;font-weight:600;color:var(--text-muted)">Legend:</span>
  <span class="cal-event upcoming" style="position:static;display:inline-block">Upcoming</span>
  <span class="cal-event checked-out" style="position:static;display:inline-block">Checked Out</span>
  <span class="cal-event returned" style="position:static;display:inline-block">Returned</span>
</div>

<div class="card">
  <div class="card-body">
    <div id="calendar-root"></div>
  </div>
</div>

<div id="cal-detail"></div>

<script id="cal-data" type="application/json">{{ cal_events | tojson }}</script>
{% endblock %}
